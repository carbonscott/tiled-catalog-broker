name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install package (editable)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e .
          uv pip install pytest 'tiled[server]' pandas pyarrow h5py 'ruamel.yaml' canonicaljson

      - name: Run unit tests
        run: |
          uv run --no-project pytest tests/ -v
