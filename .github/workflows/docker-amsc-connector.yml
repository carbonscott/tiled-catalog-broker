# Build and optionally push the amsc-connector Docker image.
#
# Triggers:
#   - push to main (when amsc-connector/ files change)
#   - pull requests  (when amsc-connector/ files change)
#   - manual dispatch
#
# Security model:
#   - Fork PRs:     build-only (secrets are unavailable, push=false)
#   - Internal PRs: build + push  → tagged  pr-<number>, sha-<hash>
#   - Push to main: build + push  → tagged  main, sha-<hash>
#
# Required GitHub secrets:
#   REGISTRY_USER  – container registry username / deploy-token name
#   REGISTRY_TOKEN – container registry password / deploy-token value

name: "amsc-connector: Docker Build & Push"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - "amsc-connector/**"
      - ".github/workflows/docker-amsc-connector.yml"
  pull_request:
    paths:
      - "amsc-connector/**"
      - ".github/workflows/docker-amsc-connector.yml"
  workflow_dispatch:

env:
  REGISTRY: cr.stanford.edu
  IMAGE_NAME: maiqmag/tiled-dev/amsc-connector

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Push on: push to main, workflow_dispatch,
      # or same-repo PRs
      - name: Determine whether to push
        id: push-gate
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to container registry
        if: steps.push-gate.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./amsc-connector
          file: ./amsc-connector/Dockerfile
          push: ${{ steps.push-gate.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          platforms: linux/amd64
          # TODO: we should really be using actions/attest@v4 for this
          # it is otherwise slightly complicated
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
