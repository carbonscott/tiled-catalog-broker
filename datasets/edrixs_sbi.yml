# EDRIXS SBI Round 0 (Sam Klein)
# 10,000 entities (5 files x 2,000 batch size)
# Source: exact-diagonalization RIXS spectra

key: EDRIXS_SBI
label: EDRIXS SBI Round 0

metadata:
  method: [EDRIXS]
  data_type: simulation
  material: NiPS3
  producer: edrixs
  project: MAIQMag

data:
  directory: /sdf/group/mli/samklein/code/sbi_maq/results/edrixs_tsnpe_scaled_data/initial_data_proper
  file_pattern: "*/simulations.h5"
  layout: batched
  # batch_size: 2000

parameters:
  location: group
  group: /params
  # 12 parameters discovered:
  #   F2_dd             float32  range [1.00, 10.00]
  #   F2_dp             float32  range [1.00, 10.00]
  #   F4_dd             float32  range [0.46, 8.74]
  #   G1_dp             float32  range [0.11, 10.00]
  #   G3_dp             float32  range [0.10, 4.00]
  #   Gam_c             float32  range [0.25, 1.00]
  #   sigma             float32  range [0.01, 0.20]
  #   soc_c             float32  range [1.00, 19.99]
  #   soc_v_i           float32  range [0.01, 1.00]
  #   soc_v_n           float32  range [0.006, 10.49]
  #   tenDq             float32  range [0.10, 5.00]
  #   xoffset           float32  range [-9.99, 9.99]

artifacts:
  - type: rixs_spectrum
    dataset: /spectra
    # shape per entity: (151, 40), dtype: float64, range: [7.28e-94, 1.0]

shared:
  - type: eloss
    dataset: /eloss
    # shape: (151,), monotonic, range [0.5, 2.0], step=0.01
  - type: omega_bounds
    dataset: /omega_bounds
    # shape: (2,), monotonic, range [0.0, 12.0], step=12

extra_metadata:
  - dataset: /log_probs
    # shape per entity: (), dtype: float32
    # range: [-inf, -15.33]

provenance:
  round: 0  # discovered from HDF5 root attribute: round_number
  # created_at: ""     # not found in HDF5 — ask data producer to add
  # code_version: ""   # not found in HDF5 — ask data producer to add
