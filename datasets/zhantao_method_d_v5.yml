# Zhantao_D — 9-DoF NiPS3 spin-wave simulations (Sunny.jl, Latin Hypercube)
#
# v5: structural changes informed by the introspection cheat (logged in
# the run notes — read tools/generate.py via inspect.getsource):
#   - data.file: -> data.file_pattern: (glob, not exact filename)
#   - artifacts: moved from data.artifacts: to top level
#   - dropped data.params:, data.entity_glob:, data.uid_template: —
#     params auto-discover from /<group>/params/, and the latter two
#     were never read.
#   - dataset field tried as group-relative path ("data" not "/{uid}/data")
#     since we're inside the grouped layout; will iterate if wrong.

label: Zhantao_D
key: ZHANTAO_D

data:
  directory: /sdf/data/lcls/ds/prj/prjmaiqmag01/results/data-source/Zhantao
  server_base_dir: /prjmaiqmag01/data-source/Zhantao
  layout: grouped
  file_pattern: nips3_fwhm4_9dof_20000_20260303_0537.h5

# Per-entity array children. In the grouped layout, each entry
# resolves under /<group_name>/<dataset>.
artifacts:
  - type: sqw
    dataset: data
  - type: powder
    dataset: powder_data
  - type: qs_rlu
    dataset: qs_rlu
  - type: qs_lab
    dataset: qs_lab
  - type: powder_qs_lab
    dataset: powder_qs_lab

metadata:
  organization: MAIQMag
  data_type: simulation
  material: NiPS3
  measurement: spin-wave
  description: >
    9-DoF Hamiltonian parameter sweep for NiPS3 via Latin Hypercube
    sampling, evaluated with Sunny.jl spin-wave theory at random
    Brillouin-zone q-points (Nq=2000) plus a powder average (Nq=300)
    over 100 energy bins.

provenance:
  producer: Sunny.jl
  producer_version: TODO
  producer_commit: TODO
  prior_distribution: latin-hypercube-9d
  created_at: TODO

shared:
  - type: energies
    dataset: /sample_1/energies
  - type: powder_energies
    dataset: /sample_1/powder_energies
