# Zhantao_D — 9-DoF NiPS3 spin-wave simulations (Sunny.jl, Latin Hypercube)
#
# v4: rename artifacts: -> arrays: under data: (Tiled's structure_family
# terminology). v3 produced 20000 entities + 0 artifacts, suggesting
# the artifacts: key was silently ignored.
# Also dropped params: block — v3 confirmed scalar params under
# /<group>/params/ are auto-discovered into entity columns even with
# no params: block; keeping it would only repeat what the generator
# already did automatically.

label: Zhantao_D
key: ZHANTAO_D

data:
  directory: /sdf/data/lcls/ds/prj/prjmaiqmag01/results/data-source/Zhantao
  server_base_dir: /prjmaiqmag01/data-source/Zhantao
  layout: grouped
  file: nips3_fwhm4_9dof_20000_20260303_0537.h5
  entity_glob: "sample_*"
  uid_template: "{group}"
  arrays:
    - type: sqw
      dataset: /{uid}/data
    - type: powder
      dataset: /{uid}/powder_data
    - type: qs_rlu
      dataset: /{uid}/qs_rlu
    - type: qs_lab
      dataset: /{uid}/qs_lab
    - type: powder_qs_lab
      dataset: /{uid}/powder_qs_lab

metadata:
  organization: MAIQMag
  data_type: simulation
  material: NiPS3
  measurement: spin-wave
  description: >
    9-DoF Hamiltonian parameter sweep for NiPS3 via Latin Hypercube
    sampling, evaluated with Sunny.jl spin-wave theory at random
    Brillouin-zone q-points (Nq=2000) plus a powder average (Nq=300)
    over 100 energy bins.

provenance:
  producer: Sunny.jl
  producer_version: TODO
  producer_commit: TODO
  prior_distribution: latin-hypercube-9d
  created_at: TODO

shared:
  - type: energies
    dataset: /sample_1/energies
  - type: powder_energies
    dataset: /sample_1/powder_energies
