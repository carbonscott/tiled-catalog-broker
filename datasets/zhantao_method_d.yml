# Zhantao_D — 9-DoF NiPS3 spin-wave simulations (Sunny.jl, Latin Hypercube)
#
# Single-file grouped layout: one HDF5 holds 20,000 sample_* groups, each
# carrying its own data, powder_data, axes, and a /params subgroup.
# This config drives `tcb generate` to produce the entity + artifact
# Parquet manifests; key fields below were discovered from
# docs/INGESTION-GUIDE.md, docs/LOCATOR-AND-MANIFEST-CONTRACT.md, and
# src/tiled_catalog_broker/{cli.py,utils.py,http_register.py}. Field
# names under `layout:` are my best guess from those references — flag
# anything wrong and I'll adjust.

label: Zhantao_D
# key: <auto-stamped by `tcb stamp-key` from slug(label) → ZHANTAO_D>

# Where the HDF5 lives on the authoring host. server_base_dir is the
# corresponding mount inside the Tiled server pod
# (TILED_SERVER_DATA_ROOT + relative-to-TILED_HOST_DATA_ROOT).
data:
  directory: /sdf/data/lcls/ds/prj/prjmaiqmag01/results/data-source/Zhantao
  server_base_dir: /prjmaiqmag01/data-source/Zhantao

# Dataset-container metadata. Drives cross-dataset discovery queries
# (Key("material") == "NiPS3", etc.).
metadata:
  organization: MAIQMag
  data_type: simulation
  material: NiPS3
  measurement: spin-wave
  description: >
    9-DoF Hamiltonian parameter sweep for NiPS3 via Latin Hypercube
    sampling, evaluated with Sunny.jl spin-wave theory at random
    Brillouin-zone q-points (Nq=2000) plus a powder average (Nq=300)
    over 100 energy bins.
  # TODO: confirm whether n_entities (20000) and Hamiltonian-parameter
  # ranges (Ax: [-0.02,0], Az: [0,0.42], J1a: [-5.4,0], ...) belong on
  # the dataset container or only as per-entity metadata.

# Provenance of the simulation. Merged into dataset-container metadata
# at register time (per cli.py:_build_dataset_metadata).
provenance:
  producer: Sunny.jl
  producer_version: TODO   # version of Sunny.jl used (not in HDF5)
  producer_commit: TODO    # git commit of nips-9d-irn (not in HDF5)
  prior_distribution: latin-hypercube-9d
  created_at: TODO         # date the HDF5 was generated
  # TODO: anything else worth keeping (slurm script, n_workers=16, etc.)?

# Shared per-axis locators. `energies` and `powder_energies` are
# bytewise-identical across all 20000 sample groups, so they're
# represented once at the dataset level. Path is anchored to a real
# entity group (sample_1) — stored verbatim in metadata so consumers
# can h5py.File(...)[<dataset>] without guessing.
shared:
- type: energies
  dataset: /sample_1/energies
- type: powder_energies
  dataset: /sample_1/powder_energies

# Layout block (grouped pattern). `tcb inspect` advertises three
# layouts — per_entity, batched, grouped — and this is grouped:
# one file, many entity groups.  Field names below are my best guess;
# flag anything that needs renaming for `tcb generate`.
layout:
  pattern: grouped
  # Single source HDF5 file (relative to data.directory).
  file: nips3_fwhm4_9dof_20000_20260303_0537.h5
  # How to enumerate entities: each top-level group whose name matches
  # the glob is one entity.  uid = the group name.
  entity_glob: "sample_*"
  uid_template: "{group}"            # group name as the manifest uid
  # Per-entity scalar parameters.  Each becomes a column in the entity
  # manifest (and thus queryable Tiled metadata on the entity container).
  params:
    group: params                    # /<uid>/params/<name>
    fields:
    - Ax
    - Az
    - J1a
    - J1b
    - J2a
    - J2b
    - J3a
    - J3b
    - J4
  # Per-entity artifact arrays. `dataset` is interpolated with the
  # entity's uid to build the locator; `index` is null in this layout.
  # Names chosen to be unique-per-entity (the `type` contract).
  artifacts:
  - type: sqw                        # main S(q,ω) on random q-points
    dataset: /{uid}/data
  - type: powder                     # powder-averaged S(|Q|, ω)
    dataset: /{uid}/powder_data
  - type: qs_rlu                     # random q-points, RLU coords
    dataset: /{uid}/qs_rlu
  - type: qs_lab                     # random q-points, lab coords
    dataset: /{uid}/qs_lab
  - type: powder_qs_lab              # powder |Q| values
    dataset: /{uid}/powder_qs_lab
  # TODO: do we need to expose per-entity /<uid>/energies and
  # /<uid>/powder_energies as artifacts in addition to the shared
  # block? They're identical across samples, so the shared locator
  # already covers Mode A — but Mode B (HTTP array children) won't
  # see them unless they're listed here. Decide based on whether
  # users want to read the energy axis through the Tiled adapter.
key: ZHANTAO_D
