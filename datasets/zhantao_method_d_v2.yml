# Zhantao_D — 9-DoF NiPS3 spin-wave simulations (Sunny.jl, Latin Hypercube)
#
# v2: relocated layout: under data: (v1 had it at top level, which made
# `tcb generate` raise KeyError 'layout' — the function reads the layout
# block off the data: subtree, not the root config).

label: Zhantao_D
key: ZHANTAO_D

# Data source description: where the HDF5 lives, how the broker should
# enumerate entities and artifacts inside it. server_base_dir is the
# corresponding mount inside the Tiled server pod
# (TILED_SERVER_DATA_ROOT + relative-to-TILED_HOST_DATA_ROOT).
data:
  directory: /sdf/data/lcls/ds/prj/prjmaiqmag01/results/data-source/Zhantao
  server_base_dir: /prjmaiqmag01/data-source/Zhantao
  # Layout block (grouped pattern). cli.py advertises three layout
  # types — per_entity, batched, grouped — and this is grouped: one
  # HDF5 with many entity groups.  Field names below remain the
  # docs-only guess flagged in the run notes.
  layout:
    pattern: grouped
    file: nips3_fwhm4_9dof_20000_20260303_0537.h5
    entity_glob: "sample_*"
    uid_template: "{group}"
    params:
      group: params
      fields:
        - Ax
        - Az
        - J1a
        - J1b
        - J2a
        - J2b
        - J3a
        - J3b
        - J4
    artifacts:
      - type: sqw
        dataset: /{uid}/data
      - type: powder
        dataset: /{uid}/powder_data
      - type: qs_rlu
        dataset: /{uid}/qs_rlu
      - type: qs_lab
        dataset: /{uid}/qs_lab
      - type: powder_qs_lab
        dataset: /{uid}/powder_qs_lab

# Dataset-container metadata. Drives cross-dataset discovery queries
# (Key("material") == "NiPS3", etc.).
metadata:
  organization: MAIQMag
  data_type: simulation
  material: NiPS3
  measurement: spin-wave
  description: >
    9-DoF Hamiltonian parameter sweep for NiPS3 via Latin Hypercube
    sampling, evaluated with Sunny.jl spin-wave theory at random
    Brillouin-zone q-points (Nq=2000) plus a powder average (Nq=300)
    over 100 energy bins.

# Provenance of the simulation. Merged into dataset-container metadata
# at register time (per cli.py:_build_dataset_metadata). All fields
# left as TODO per user — fill later if needed.
provenance:
  producer: Sunny.jl
  producer_version: TODO
  producer_commit: TODO
  prior_distribution: latin-hypercube-9d
  created_at: TODO

# Shared per-axis locators. `energies` and `powder_energies` are
# bytewise-identical across all 20000 sample groups, so represented
# once at the dataset level. Anchored to a real entity group so the
# stored path is loadable verbatim.
shared:
  - type: energies
    dataset: /sample_1/energies
  - type: powder_energies
    dataset: /sample_1/powder_energies
