server {
    listen 80;

    # Serve the React SPA from root
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls through to the tiled backend
    location /api/ {
        proxy_pass         http://tiled:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Proxy UI settings endpoint
    location /tiled-ui-settings {
        proxy_pass         http://tiled:8000/tiled-ui-settings;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
